<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百家乐路单模拟 - 大路 + 大眼仔 + 小路 + 小强路</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: #1a6b2a;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* 操作按钮区 */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-zhuang, .btn-xian, .btn-he, .btn-undo, .btn-clear {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }
    .btn-zhuang { background: #e53935; color: #fff; box-shadow: 0 3px 8px rgba(229,57,53,0.5); }
    .btn-zhuang:hover { background: #c62828; }
    .btn-xian   { background: #1565c0; color: #fff; box-shadow: 0 3px 8px rgba(21,101,192,0.5); }
    .btn-xian:hover   { background: #0d47a1; }
    .btn-he     { background: #2e7d32; color: #fff; box-shadow: 0 3px 8px rgba(46,125,50,0.5); border: 2px solid #66bb6a; }
    .btn-he:hover     { background: #1b5e20; }
    .btn-undo   { background: #5d4037; color: #fff; }
    .btn-undo:hover   { background: #4e342e; }
    .btn-clear  { background: #37474f; color: #cfd8dc; }
    .btn-clear:hover  { background: #263238; }

    /* 路单容器 */
    .road-wrap {
      background: #f5e6c8;
      border: 3px solid #8b6914;
      border-radius: 6px;
      padding: 6px;
      width: 100%;
      max-width: 900px;
    }

    .road-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5d3a00;
      margin-bottom: 4px;
      padding-left: 2px;
    }

    /* 格子网格 */
    .road-grid {
      display: grid;
      border: 1px solid #c8a96e;
      background: #c8a96e;
      gap: 1px;
      overflow: hidden;
    }

    /* 大路：6行 */
    .road-grid.dalu {
      grid-template-rows: repeat(6, 36px);
      grid-template-columns: repeat(40, 36px);
    }

    /* 大眼仔/小路/小强路：6行 */
    .road-grid.dayanjzi,
    .road-grid.xiaolu,
    .road-grid.xiaoqiang {
      grid-template-rows: repeat(6, 20px);
      grid-template-columns: repeat(70, 20px);
    }

    .cell {
      background: #f5e6c8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      position: relative;
    }

    /* 大路棋子 */
    .circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      position: relative;
    }
    .circle.zhuang { background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b); border: 2px solid #922b21; }
    .circle.xian   { background: radial-gradient(circle at 35% 35%, #5dade2, #1565c0); border: 2px solid #0d47a1; }
    .circle.he     { background: radial-gradient(circle at 35% 35%, #58d68d, #1e8449); border: 2px solid #145a32; }

    /* 大眼仔小圆圈 */
    .mini-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid currentColor;
    }
    .mini-circle.red  { color: #e53935; border-color: #e53935; background: transparent; }
    .mini-circle.blue { color: #1565c0; border-color: #1565c0; background: transparent; }

    /* 路单上方区域：大路+大眼仔并排 */
    .roads-row {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .road-scroll {
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* 计数器 */
    .counter-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .cnt-z { color: #ff8a80; }
    .cnt-x { color: #82b1ff; }
    .cnt-h { color: #a5d6a7; }
    .cnt-t { color: #fff; }

    .history-text {
      color: #aed6a0;
      font-size: 0.78rem;
      max-width: 900px;
      word-break: break-all;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>🎴 百家乐路单模拟</h1>

<div class="controls">
  <button class="btn-zhuang" onclick="addResult(1)">庄 (Banker)</button>
  <button class="btn-xian"   onclick="addResult(2)">闲 (Player)</button>
  <button class="btn-he"     onclick="addResult(3)">和 (Tie)</button>
  <button class="btn-undo"   onclick="undoLast()">↩ 撤销</button>
  <button class="btn-clear"  onclick="clearAll()">🗑 清空</button>
</div>

<div class="counter-row">
  <span class="cnt-z">庄: <span id="cnt-z">0</span></span>
  <span class="cnt-x">闲: <span id="cnt-x">0</span></span>
  <span class="cnt-h">和: <span id="cnt-h">0</span></span>
  <span class="cnt-t">共: <span id="cnt-t">0</span></span>
</div>

<div class="roads-row">

  <!-- 大路 -->
  <div class="road-wrap">
    <div class="road-label">大路</div>
    <div class="road-scroll">
      <div class="road-grid dalu" id="dalu-grid"></div>
    </div>
  </div>

  <!-- 大眼仔 -->
  <div class="road-wrap">
    <div class="road-label">大眼仔</div>
    <div class="road-scroll">
      <div class="road-grid dayanjzi" id="dayanzi-grid"></div>
    </div>
  </div>

  <!-- 小路 -->
  <div class="road-wrap">
    <div class="road-label">小路</div>
    <div class="road-scroll">
      <div class="road-grid xiaolu" id="xiaolu-grid"></div>
    </div>
  </div>

  <!-- 小强路 -->
  <div class="road-wrap">
    <div class="road-label">小强路</div>
    <div class="road-scroll">
      <div class="road-grid xiaoqiang" id="xiaoqiang-grid"></div>
    </div>
  </div>

</div>

<div class="history-text" id="history-text"></div>

<script>
// ────────────────────────────────────────────────
// 数据
// ────────────────────────────────────────────────

// 每局结果：1=庄, 2=闲, 3=和
var results = [];

// 大路格子配置
var DALU_ROWS = 6;
var DALU_COLS = 40;
var DAYANZI_ROWS = 6;
var DAYANZI_COLS = 70;

// ────────────────────────────────────────────────
// 大路布局算法（无拐角版）
// 同色无限往下延伸，换色才换列从第1行开始。
// col == logicCol（两者相同，保留 logicCol 字段供下三路使用）
// ────────────────────────────────────────────────
function buildDaluLayout(results) {
  var cells = [];
  var col = 0;
  var row = 0;
  var lastType = 0;

  for (var i = 0; i < results.length; i++) {
    var t = results[i];

    if (t === 3) {
      // 和：附在最后一个非和格子上
      if (cells.length > 0) {
        cells[cells.length - 1].hePlus = (cells[cells.length - 1].hePlus || 0) + 1;
      }
      continue;
    }

    if (lastType === 0) {
      col = 0; row = 0;
    } else if (t === lastType) {
      row++; // 同色：继续往下，无限延伸
    } else {
      col++; row = 0; // 换色：新列，从第1行开始
    }

    // col 即为逻辑列（无拐角，物理列==逻辑列）
    cells.push({ col: col, row: row, type: t, hePlus: 0, logicCol: col });
    lastType = t;
  }

  return cells;
}

// 大眼仔：offset=1
function buildDayanziLayout(daluCells) {
  return buildDerivedRoad(daluCells, 1, false);
}

// 小路：offset=2
function buildXiaoluLayout(daluCells) {
  return buildDerivedRoad(daluCells, 2, true);
}

// 小强路：offset=3
function buildXiaoqiangLayout(daluCells) {
  return buildDerivedRoad(daluCells, 3, true);
}

// ────────────────────────────────────────────────
// 通用衍生路算法（大眼仔 / 小路 / 小强路）
//
// 使用 daluCells 的 logicCol 和 row，无限行版本。
//
// offset=1 大眼仔：从大路第3列(c>=2)起，或第2列(c==1)的第2行(r>=1)起触发
//   新列(r=0)：比较 len(c-1) vs len(c-2)，相等→红，不等→蓝
//   续列(r>0)：看 c-1 列的第r行 vs 第r-1行是否都有格子，相同→红，不同→蓝
//
// offset=2 小路：从大路第4列(c>=3)，或第3列(c==2)r>=1 触发
//   新列：len(c-1) vs len(c-3)
//   续列：看 c-2 列
//
// offset=3 小强路：从大路第5列(c>=4)，或第4列(c==3)r>=1 触发
//   新列：len(c-1) vs len(c-4)
//   续列：看 c-3 列
//
// 下三路自身也无限行：同色继续往下，换色才换列。
// ────────────────────────────────────────────────
function buildDerivedRoad(daluCells, offset, skipFirstRow) {
  var derivedCells = [];
  var colLens = []; // 大路每列已出现的行数（随遍历逐步积累）

  var dCol = 0;
  var dRow = 0;
  var lastIsRed = null;

  for (var i = 0; i < daluCells.length; i++) {
    var cell = daluCells[i];
    var c = cell.logicCol;
    var r = cell.row;

    // 先更新大路列长（此格生成前的状态作为判断依据，所以在判断后再更新）
    // 实际上新列(r=0)时 colLens[c] 应为0（本列第一格），续列时已有值
    // 为保证"先判断再更新"，在判断完后再写入
    while (colLens.length <= c) colLens.push(0);

    var isNewCol = (r === 0);
    var refCol = c - 1 - offset;

    // 触发条件
    var triggered = skipFirstRow
      ? (c > offset) || (c === offset && r > 0)
      : (refCol >= 0);

    if (triggered) {
      var entryRed;
      if (isNewCol) {
        // 新列：比较前一列长度 vs 远端列长度
        var prevLen = colLens[c - 1] || 0;
        var refLen  = (refCol >= 0 ? colLens[refCol] : 0) || 0;
        entryRed = (prevLen === refLen);
      } else {
        // 续列：检查参考列的第r行和第r-1行是否都存在
        // 大眼仔(offset=1)：看 c-1 列；小路(offset=2)：看 c-2 列；小强路(offset=3)：看 c-3 列
        var checkCol = c - offset;
        var checkLen = (checkCol >= 0 ? colLens[checkCol] : 0) || 0;
        var hasCur  = (r     < checkLen);
        var hasPrev = (r - 1 < checkLen);
        entryRed = (hasCur === hasPrev);
      }

      // 放置衍生路格子：同色→往下（无限），换色→新列第1行
      if (lastIsRed === null) {
        dCol = 0; dRow = 0;
      } else if (entryRed === lastIsRed) {
        dRow++; // 无限往下，不再限制行数
      } else {
        dCol++; dRow = 0;
      }

      derivedCells.push({ col: dCol, row: dRow, isRed: entryRed });
      lastIsRed = entryRed;
    }

    // 判断完毕后更新大路列长
    colLens[c] = r + 1;
  }

  return derivedCells;
}

// ────────────────────────────────────────────────
// 渲染大路（无限行版）
// ────────────────────────────────────────────────
function renderDalu(cells) {
  var grid = document.getElementById('dalu-grid');

  // 计算需要多少行、多少列
  var maxCol = 0, maxRow = 0;
  for (var i = 0; i < cells.length; i++) {
    if (cells[i].col > maxCol) maxCol = cells[i].col;
    if (cells[i].row > maxRow) maxRow = cells[i].row;
  }
  var totalCols = Math.max(DALU_COLS, maxCol + 5);
  var totalRows = Math.max(DALU_ROWS, maxRow + 1);

  grid.style.gridTemplateColumns = 'repeat(' + totalCols + ', 36px)';
  grid.style.gridTemplateRows    = 'repeat(' + totalRows + ', 36px)';

  // 建立格子映射
  var map = {};
  for (var i = 0; i < cells.length; i++) {
    map[cells[i].col + '_' + cells[i].row] = cells[i];
  }

  var html = '';
  for (var r = 0; r < totalRows; r++) {
    for (var c = 0; c < totalCols; c++) {
      var cell = map[c + '_' + r];
      if (cell) {
        var cls   = cell.type === 1 ? 'zhuang' : (cell.type === 2 ? 'xian' : 'he');
        var label = cell.type === 1 ? '庄'     : (cell.type === 2 ? '闲'   : '和');
        html += '<div class="cell"><div class="circle ' + cls + '">' + label;
        if (cell.hePlus > 0) {
          html += '<span style="position:absolute;top:-4px;right:-4px;background:#2e7d32;color:#fff;border-radius:50%;width:12px;height:12px;font-size:8px;display:flex;align-items:center;justify-content:center;border:1px solid #145a32;">' + cell.hePlus + '</span>';
        }
        html += '</div></div>';
      } else {
        html += '<div class="cell"></div>';
      }
    }
  }
  grid.innerHTML = html;
}

// ────────────────────────────────────────────────
// 渲染大眼仔 / 小路 / 小强路（无限行版）
// ────────────────────────────────────────────────
function renderMiniRoad(cells, gridId, totalColsMin) {
  var grid = document.getElementById(gridId);

  var maxCol = 0, maxRow = 0;
  for (var i = 0; i < cells.length; i++) {
    if (cells[i].col > maxCol) maxCol = cells[i].col;
    if (cells[i].row > maxRow) maxRow = cells[i].row;
  }
  var totalCols = Math.max(totalColsMin, maxCol + 5);
  var totalRows = Math.max(DAYANZI_ROWS, maxRow + 1);

  grid.style.gridTemplateColumns = 'repeat(' + totalCols + ', 20px)';
  grid.style.gridTemplateRows    = 'repeat(' + totalRows + ', 20px)';

  var map = {};
  for (var i = 0; i < cells.length; i++) {
    map[cells[i].col + '_' + cells[i].row] = cells[i];
  }

  var html = '';
  for (var r = 0; r < totalRows; r++) {
    for (var c = 0; c < totalCols; c++) {
      var cell = map[c + '_' + r];
      if (cell) {
        var cls = cell.isRed ? 'red' : 'blue';
        html += '<div class="cell"><div class="mini-circle ' + cls + '"></div></div>';
      } else {
        html += '<div class="cell"></div>';
      }
    }
  }
  grid.innerHTML = html;
}

// ────────────────────────────────────────────────
// 更新计数器
// ────────────────────────────────────────────────
function updateCounters() {
  var z = 0, x = 0, h = 0;
  for (var i = 0; i < results.length; i++) {
    if (results[i] === 1) z++;
    else if (results[i] === 2) x++;
    else h++;
  }
  document.getElementById('cnt-z').textContent = z;
  document.getElementById('cnt-x').textContent = x;
  document.getElementById('cnt-h').textContent = h;
  document.getElementById('cnt-t').textContent = results.length;

  var histLabels = results.map(function(r) {
    return r === 1 ? '庄' : (r === 2 ? '闲' : '和');
  });
  document.getElementById('history-text').textContent = histLabels.length > 0
    ? '记录：' + histLabels.join(' ')
    : '';
}

// ────────────────────────────────────────────────
// 主渲染入口
// ────────────────────────────────────────────────
function render() {
  var daluCells     = buildDaluLayout(results);
  var dayanziCells  = buildDayanziLayout(daluCells);
  var xiaoluCells   = buildXiaoluLayout(daluCells);
  var xiaoqiangCells = buildXiaoqiangLayout(daluCells);

  renderDalu(daluCells);
  renderMiniRoad(dayanziCells,   'dayanzi-grid',  DAYANZI_COLS);
  renderMiniRoad(xiaoluCells,    'xiaolu-grid',   DAYANZI_COLS);
  renderMiniRoad(xiaoqiangCells, 'xiaoqiang-grid', DAYANZI_COLS);
  updateCounters();
}

// ────────────────────────────────────────────────
// 操作
// ────────────────────────────────────────────────
function addResult(type) {
  results.push(type);
  render();
}

function undoLast() {
  if (results.length > 0) {
    results.pop();
    render();
  }
}

function clearAll() {
  results = [];
  render();
}

// ────────────────────────────────────────────────
// 马尔科夫预测（与 ag-markov.js 完全一致）
// ────────────────────────────────────────────────

var PREDICT_LEN = 4;

// ── 一阶马尔科夫 ──
function buildMarkov1(seq) {
  var counts = { '0': { '0': 0, '1': 0 }, '1': { '0': 0, '1': 0 } };
  for (var i = 0; i < seq.length - 1; i++) {
    counts[seq[i]][seq[i + 1]]++;
  }
  var prob = {};
  var states = ['0', '1'];
  for (var si = 0; si < states.length; si++) {
    var from = states[si];
    var total = counts[from]['0'] + counts[from]['1'];
    prob[from] = {
      '0': total ? counts[from]['0'] / total : 0.5,
      '1': total ? counts[from]['1'] / total : 0.5
    };
  }
  return prob;
}

function predictTop1Order1(seq) {
  if (seq.length < 3) return null;
  var prob = buildMarkov1(seq);
  var lastBit = seq[seq.length - 1];
  var n = PREDICT_LEN;
  var total = Math.pow(2, n);
  var bestBits = '';
  var bestP = -1;
  for (var mask = 0; mask < total; mask++) {
    var bits = mask.toString(2).padStart(n, '0');
    var p = 1;
    var cur = lastBit;
    for (var j = 0; j < bits.length; j++) {
      p *= prob[cur][bits[j]];
      cur = bits[j];
    }
    if (p > bestP) { bestP = p; bestBits = bits; }
  }
  return { bits: bestBits, p: bestP };
}

// ── 二阶马尔科夫 ──
function buildMarkov2(seq) {
  var states = ['00', '01', '10', '11'];
  var counts = {};
  for (var si = 0; si < states.length; si++) counts[states[si]] = { '0': 0, '1': 0 };
  for (var i = 0; i < seq.length - 2; i++) {
    var from = seq[i] + seq[i + 1];
    if (counts[from]) counts[from][seq[i + 2]]++;
  }
  var prob = {};
  for (var si2 = 0; si2 < states.length; si2++) {
    var s = states[si2];
    var total = counts[s]['0'] + counts[s]['1'];
    prob[s] = {
      '0': total ? counts[s]['0'] / total : 0.5,
      '1': total ? counts[s]['1'] / total : 0.5
    };
  }
  return prob;
}

function predictTop1Order2(seq) {
  if (seq.length < 5) return null;
  var prob = buildMarkov2(seq);
  var lastTwo = seq[seq.length - 2] + seq[seq.length - 1];
  var n = PREDICT_LEN;
  var total = Math.pow(2, n);
  var bestBits = '';
  var bestP = -1;
  for (var mask = 0; mask < total; mask++) {
    var bits = mask.toString(2).padStart(n, '0');
    var p = 1;
    var cur = lastTwo;
    for (var j = 0; j < bits.length; j++) {
      p *= (prob[cur] ? prob[cur][bits[j]] : 0.5);
      cur = cur[1] + bits[j];
    }
    if (p > bestP) { bestP = p; bestBits = bits; }
  }
  return { bits: bestBits, p: bestP };
}

// ── 辅助：从 daluCells 提取列长数组 ──
function getDaluColLens(daluCells) {
  var colLens = [];
  for (var i = 0; i < daluCells.length; i++) {
    var c = daluCells[i].logicCol;
    var r = daluCells[i].row;
    while (colLens.length <= c) colLens.push(0);
    if (r + 1 > colLens[c]) colLens[c] = r + 1;
  }
  return colLens;
}

// ── 辅助：从 daluCells 获取最后一列类型和长度 ──
function getDaluLastCol(daluCells) {
  if (daluCells.length === 0) return { type: 0, len: 0 };
  var lastLogicCol = daluCells[daluCells.length - 1].logicCol;
  var lastColType  = daluCells[daluCells.length - 1].type;
  var maxRow = 0;
  for (var i = daluCells.length - 1; i >= 0; i--) {
    if (daluCells[i].logicCol === lastLogicCol) {
      if (daluCells[i].row > maxRow) maxRow = daluCells[i].row;
    } else { break; }
  }
  return { type: lastColType, len: maxRow + 1 };
}

// ── 辅助：从 daluCells 提取庄闲序列（庄='0', 闲='1'，跳过和） ──
function getDaluSeq(daluCells) {
  var seq = [];
  for (var i = 0; i < daluCells.length; i++) {
    var t = daluCells[i].type;
    if (t === 1) seq.push('0');
    else if (t === 2) seq.push('1');
  }
  return seq;
}

// ── 辅助：从衍生路 cells 提取红蓝序列（红='0', 蓝='1'） ──
function getDerivedSeq(derivedCells) {
  var seq = [];
  for (var i = 0; i < derivedCells.length; i++) {
    seq.push(derivedCells[i].isRed ? '0' : '1');
  }
  return seq;
}

// ── simulateDerivedColor（与 ag-markov.js 完全一致） ──
function simulateDerivedColor(colLens, lastType, lastLen, addType, offset) {
  var totalCols = colLens.length;
  if (addType === lastType) {
    var curRow    = lastLen;
    var checkIdx  = totalCols - 1 - offset;
    var checkLen  = (checkIdx >= 0 ? colLens[checkIdx] : 0) || 0;
    var hasCur    = (curRow     < checkLen);
    var hasPrev   = (curRow - 1 < checkLen);
    return (hasCur === hasPrev);
  } else {
    if (totalCols - 1 - offset < 0) return true;
    var prevLen = colLens[totalCols - 1] || 0;
    var refLen  = colLens[totalCols - 1 - offset] || 0;
    return (prevLen === refLen);
  }
}

// ── derivedBitsToZX（与 ag-markov.js 完全一致） ──
function derivedBitsToZX(predictedBits, colLens, lastColType, lastColLen, gapCols) {
  var result  = '';
  var cl      = colLens.slice();
  var lt      = lastColType;
  var ll      = lastColLen;
  for (var i = 0; i < predictedBits.length; i++) {
    var predictedRed = (predictedBits[i] === '0');
    var matched = 0;
    for (var tryType = 1; tryType <= 2; tryType++) {
      if (simulateDerivedColor(cl, lt, ll, tryType, gapCols) === predictedRed) {
        matched = tryType; break;
      }
    }
    if (matched === 0) matched = lt;
    result += (matched === 1) ? '0' : '1';
    var actual = matched === 1 ? 2 : 1;
    if (actual === lt) {
      ll++;
      cl[cl.length - 1] = ll;
    } else {
      cl.push(1);
      lt = actual;
      ll = 1;
    }
  }
  return result;
}

// ── 颜色辅助 ──
function colorZX(bits) {
  return bits.split('').map(function(b) {
    var color = b === '0' ? '#ff4d4f' : '#4da6ff';
    return '<span style="color:' + color + '">' + b + '</span>';
  }).join('');
}

function zxLabel(bits) {
  return '(' + bits.split('').map(function(b) {
    if (b === '0') return '<span style="color:#ff4d4f">庄</span>';
    return '<span style="color:#4da6ff">闲</span>';
  }).join('') + ')';
}

// ── 锁定缓存：计算一次后固定，直到手动刷新 ──
var _lockedHTML = null;  // null = 尚未锁定，string = 已锁定的 HTML

function refreshPredict() {
  _lockedHTML = null;
  renderPrediction();
  // 按钮短暂反馈
  var btn = document.getElementById('predict-refresh');
  if (btn) {
    btn.textContent = '✅';
    setTimeout(function() { btn.textContent = '🔄'; }, 800);
  }
}

// 清空路单时同时清掉锁定
var _origClearAll = clearAll;
clearAll = function() {
  _lockedHTML = null;
  _origClearAll();
};

// ── 马尔科夫预测主入口 ──
function renderPrediction() {
  var panel = document.getElementById('prediction-panel');
  if (!panel) return;

  // 已锁定：直接复用缓存，不重新计算
  if (_lockedHTML !== null) {
    panel.innerHTML = _lockedHTML;
    return;
  }

  // 过滤掉和局，用非和局数量判断数据是否充足
  var nonTie = results.filter(function(r) { return r !== 3; });
  if (nonTie.length < 20) {
    panel.innerHTML = '<span style="color:#aaa;">（满20局非和局后显示推测）目前 ' + nonTie.length + '/20 局</span>';
    return;
  }

  // 构建大路 cells，提取列状态
  var daluCells = buildDaluLayout(results);
  var colLens   = getDaluColLens(daluCells);
  var lastCol   = getDaluLastCol(daluCells);

  // 四条路的序列和配置（与 ag-markov.js 的 roads 数组一致）
  var dayanziCells   = buildDayanziLayout(daluCells);
  var xiaoluCells    = buildXiaoluLayout(daluCells);
  var xiaoqiangCells = buildXiaoqiangLayout(daluCells);

  var roads = [
    { name: '大路',   seq: getDaluSeq(daluCells),       type: 'daLu',    gap: 0 },
    { name: '大眼仔', seq: getDerivedSeq(dayanziCells),  type: 'derived', gap: 1 },
    { name: '小路',   seq: getDerivedSeq(xiaoluCells),   type: 'derived', gap: 2 },
    { name: '小强',   seq: getDerivedSeq(xiaoqiangCells),type: 'derived', gap: 3 }
  ];

  var html = '';
  for (var i = 0; i < roads.length; i++) {
    var road = roads[i];
    var top1_o1 = predictTop1Order1(road.seq);
    var top1_o2 = predictTop1Order2(road.seq);

    // 反推为庄闲（大路直接用 bits，下三路用 derivedBitsToZX）
    var o1ZX = null, o2ZX = null;
    if (top1_o1) {
      o1ZX = (road.type === 'daLu')
        ? top1_o1.bits
        : derivedBitsToZX(top1_o1.bits, colLens, lastCol.type, lastCol.len, road.gap);
    }
    if (top1_o2) {
      o2ZX = (road.type === 'daLu')
        ? top1_o2.bits
        : derivedBitsToZX(top1_o2.bits, colLens, lastCol.type, lastCol.len, road.gap);
    }

    // 一致性标记
    var consensus = (o1ZX && o2ZX && o1ZX === o2ZX)
      ? '<span style="font-size:9px;color:#34d399;margin-left:4px;">✅</span>' : '';

    html += '<div style="padding:5px 0;border-bottom:1px solid rgba(42,42,74,0.6);">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">';
    html += '<span style="font-size:11px;color:#818cf8;font-weight:600;">' + road.name + consensus + '</span>';
    html += '</div>';

    // 一阶
    if (top1_o1) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding-left:8px;">';
      html += '<span style="font-size:10px;color:#6b6b8a;">1阶</span>';
      html += '<span>';
      html += '<span style="font-family:Courier New,monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;">' + colorZX(top1_o1.bits) + '</span>';
      html += '<span style="font-size:9px;margin-left:3px;">' + (o1ZX ? zxLabel(o1ZX) : '') + '</span>';
      html += '<span style="font-size:10px;color:#34d399;margin-left:5px;">' + (top1_o1.p * 100).toFixed(2) + '%</span>';
      html += '</span></div>';
    } else {
      html += '<div style="padding-left:8px;font-size:10px;color:#6b6b8a;">1阶 数据不足</div>';
    }

    // 二阶
    if (top1_o2) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding-left:8px;">';
      html += '<span style="font-size:10px;color:#6b6b8a;">2阶</span>';
      html += '<span>';
      html += '<span style="font-family:Courier New,monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;">' + colorZX(top1_o2.bits) + '</span>';
      html += '<span style="font-size:9px;margin-left:3px;">' + (o2ZX ? zxLabel(o2ZX) : '') + '</span>';
      html += '<span style="font-size:10px;color:#34d399;margin-left:5px;">' + (top1_o2.p * 100).toFixed(2) + '%</span>';
      html += '</span></div>';
    } else {
      html += '<div style="padding-left:8px;font-size:10px;color:#6b6b8a;">2阶 数据不足</div>';
    }

    html += '</div>';
  }

  // 首次计算完毕，锁定结果
  _lockedHTML = html;
  panel.innerHTML = html;
}

// 重写 render，追加调用预测
var _origRender = render;
render = function() {
  _origRender();
  renderPrediction();
};

// 悬浮窗拖动 + 收起
document.addEventListener('DOMContentLoaded', function() {
  var panel  = document.getElementById('predict-float');
  var header = document.getElementById('predict-header');
  var body   = document.getElementById('predict-body');
  var toggle = document.getElementById('predict-toggle');
  if (!panel || !header) return;

  var dragging = false, ox = 0, oy = 0;
  header.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON' || e.target.id === 'predict-toggle') return;
    dragging = true;
    ox = e.clientX - panel.offsetLeft;
    oy = e.clientY - panel.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    panel.style.right  = 'auto';
    panel.style.bottom = 'auto';
    panel.style.left   = (e.clientX - ox) + 'px';
    panel.style.top    = (e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', function() { dragging = false; });

  toggle.addEventListener('click', function() {
    var collapsed = body.style.display === 'none';
    body.style.display = collapsed ? '' : 'none';
    toggle.textContent = collapsed ? '—' : '＋';
  });
});

render();
</script>

<!-- 马尔科夫预测悬浮面板 -->
<div id="predict-float" style="position:fixed;bottom:20px;right:20px;z-index:9999;background:rgba(15,15,26,0.95);border:2px solid #7c3aed;border-radius:10px;font-family:'Microsoft YaHei','Segoe UI',sans-serif;font-size:13px;color:#e0e0f0;min-width:260px;box-shadow:0 4px 20px rgba(124,58,237,0.4);user-select:none;">
  <!-- 标题栏（可拖动） -->
  <div id="predict-header" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(124,58,237,0.2);border-radius:10px 10px 0 0;cursor:move;">
    <span style="color:#c4b5fd;font-weight:700;font-size:13px;">🔮 马尔科夫预测</span>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="predict-refresh" onclick="refreshPredict()" title="重新预测（解除锁定）" style="padding:2px 8px;background:#7c3aed;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;">🔄</button>
      <span id="predict-toggle" style="cursor:pointer;font-size:15px;color:#c4b5fd;line-height:1;" title="收起/展开">—</span>
    </div>
  </div>
  <!-- 内容区 -->
  <div id="predict-body" style="padding:10px 12px;">
    <div id="prediction-panel" style="color:#e0e0f0;font-size:12px;">
      （满20局非和局后显示）目前 0/20 局
    </div>
  </div>
</div>

</body>
</html>
